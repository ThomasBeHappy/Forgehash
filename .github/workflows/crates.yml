name: Publish crates.io

# Uses crates.io Trusted Publishing (OIDC) after the first manual/bootstrap publish.
# Docs: https://crates.io/docs/trusted-publishing
#
# Bootstrap (required once per crate — Trusted Publishing cannot create a new crate):
#   1. cargo login  (or set temporary CARGO_REGISTRY_TOKEN secret)
#   2. Publish forgeh / forgehx once (local or this workflow with the secret)
#   3. On crates.io → crate → Settings → Trusted Publishing:
#        Owner:       ThomasBeHappy
#        Repository:  Forgehash
#        Workflow:    crates.yml
#        Environment: (leave empty unless you add environment: below)
#   4. Delete CARGO_REGISTRY_TOKEN — later runs use OIDC only

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push to crates.io (OIDC or CARGO_REGISTRY_TOKEN bootstrap)"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [forgeh, forgehx]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Test ${{ matrix.crate }}
        run: cargo test --manifest-path langs/rust/${{ matrix.crate }}/Cargo.toml --release

  publish:
    needs: test
    if: ${{ (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for GitHub OIDC → crates.io
    env:
      # Secrets cannot be used directly in step `if:` — stash presence here.
      HAS_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        if: ${{ env.HAS_TOKEN != 'true' }}
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "No CARGO_REGISTRY_TOKEN and OIDC auth did not produce a token." >&2
            echo "Bootstrap: set CARGO_REGISTRY_TOKEN, publish once, then add Trusted Publishing on crates.io." >&2
            exit 1
          fi
          cargo publish --manifest-path langs/rust/forgeh/Cargo.toml
          cargo publish --manifest-path langs/rust/forgehx/Cargo.toml
