name: Publish PyPI

# Uses PyPI Trusted Publishing (OIDC) — no long-lived API token.
# Docs: https://docs.pypi.org/trusted-publishers/
#
# One-time setup on pypi.org for EACH project (forgeh, forgehx):
#   Publishing → Trusted Publishers → Add a new pending publisher (or publisher):
#     Owner:          ThomasBeHappy
#     Repository:     Forgehash
#     Workflow name:  pypi.yml
#     Environment:    (leave empty unless you add environment: below)
#
# Pending publishers work for brand-new project names (creates the project on first upload).

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push to PyPI via Trusted Publishing (OIDC)"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [forgeh, forgehx]
    defaults:
      run:
        working-directory: langs/python/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U pip build

      - name: Install package + run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-${{ matrix.package }}
          path: langs/python/${{ matrix.package }}/dist/*

  publish:
    needs: build
    if: ${{ (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [forgeh, forgehx]
    permissions:
      contents: read
      id-token: write # required for GitHub OIDC → PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-${{ matrix.package }}
          path: dist

      - name: Publish ${{ matrix.package }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
