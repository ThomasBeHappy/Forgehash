name: Publish PyPI (forgehx)

# Uses PyPI Trusted Publishing (OIDC) — no long-lived API token.
# Docs: https://docs.pypi.org/trusted-publishers/
#
# One-time pending publisher on pypi.org:
#   Project name:  forgehx
#   Owner:         ThomasBeHappy
#   Repository:    Forgehash
#   Workflow name: pypi-forgehx.yml
#   Environment:   (leave empty)

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push forgehx to PyPI via Trusted Publishing (OIDC)"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langs/python/forgehx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U pip build

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Vector tests
        run: python -m pytest -v

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-forgehx
          path: langs/python/forgehx/dist/*

  publish:
    needs: build
    if: ${{ (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && inputs.push) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-forgehx
          path: dist

      - name: Publish forgehx to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
